services:
  - type: web
    name: natillera-webhook
    runtime: go
    plan: free
    buildCommand: go build -trimpath -ldflags="-s -w" -o server ./cmd/server
    startCommand: ./server
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
