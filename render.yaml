services:
  - type: web
    name: natillera-webhook
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: SMTP_TIMEOUT_SECONDS
        value: "10"
