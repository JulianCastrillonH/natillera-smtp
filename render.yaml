services:
  - type: web
    name: natillera-webhook
    runtime: go
    plan: free
    buildCommand: go build -trimpath -ldflags="-s -w" -o server ./cmd/server
    startCommand: ./server
    envVars:
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: SMTP_TIMEOUT_SECONDS
        value: "10"
