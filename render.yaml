services:
  - type: web
    name: natillera-webhook
    runtime: go
    plan: free
    buildCommand: go build -trimpath -ldflags="-s -w" -o server ./cmd/server
    startCommand: ./server
    envVars:
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        value: "smtp-mail.outlook.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_TIMEOUT_SECONDS
        value: "30"
