services:
  - type: web
    name: natillera-webhook
    runtime: go
    plan: free
    buildCommand: go build -trimpath -ldflags="-s -w" -o server ./cmd/server
    startCommand: ./server
    envVars:
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: "Natillera"
      - key: WEBHOOK_SECRET
        sync: false
